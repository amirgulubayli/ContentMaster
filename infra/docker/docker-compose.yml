services:
  postgres:
    image: postgres:16-alpine
    container_name: content-empire-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: contentempire
      POSTGRES_USER: contentempire
      POSTGRES_PASSWORD: contentempire
    volumes:
      - content_empire_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contentempire -d contentempire"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - content_empire

  redis:
    image: redis:7-alpine
    container_name: content-empire-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - content_empire

  minio:
    image: minio/minio:latest
    container_name: content-empire-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-contentempire}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-contentempire-secret}
    volumes:
      - content_empire_minio:/data
    networks:
      - content_empire

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
      args:
        WORKSPACE: "@content-empire/api"
    container_name: content-empire-api
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - content_empire

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
      args:
        WORKSPACE: "@content-empire/web"
    container_name: content-empire-web
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - content_empire

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
      args:
        WORKSPACE: "@content-empire/worker"
    container_name: content-empire-worker
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - content_empire

  session-runner:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.session-runner
    container_name: content-empire-session-runner
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4200/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - content_empire

  renderer:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.node
      args:
        WORKSPACE: "@content-empire/renderer"
    container_name: content-empire-renderer
    restart: unless-stopped
    env_file:
      - ../../.env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4300/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - content_empire

  nginx:
    image: nginx:1.29-alpine
    container_name: content-empire-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:8088:80"
    networks:
      - content_empire

networks:
  content_empire:
    name: content_empire

volumes:
  content_empire_postgres:
  content_empire_minio:
